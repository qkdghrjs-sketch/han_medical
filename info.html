<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진료안내 | 한내과의원</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="/">한내과의원</a>
      <button class="menu-btn" aria-label="메뉴 열기">☰</button>
      <nav class="nav">
        <a href="/">홈</a>
        <a href="/departments">진료과목</a>
        <a href="/programs">피부 프로그램</a>
        <a href="/info">진료안내</a>
        <a href="/contact">오시는길</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h2>진료시간 · 검사안내</h2>

      <div class="grid-2">
        <article class="card">
          <h3>진료시간</h3>
          <ul class="list-clean">
            <li>월~금 09:00 ~ 18:00</li>
            <li>점심시간 13:00 ~ 14:00</li>
            <li>토요일 1·3주 휴무 / 2·4주 14:00까지</li>
            <li>일요일 정기휴무</li>
            <li>공휴일 휴무</li>
          </ul>
        </article>

        <article class="card">
          <h3>검사안내</h3>
          <ul class="list-clean">
            <li>공단(일반)검진</li>
            <li>종합검진</li>
            <li>혈액 종합검진(암지표)</li>
            <li>초음파(복부·갑상선·경동맥)</li>
            <li>골밀도 검사</li>
            <li>독감 예방접종</li>
          </ul>
        </article>
      </div>
    </div>
  </main>

  <footer class="footer">© 2026 한내과의원</footer>
  <script src="script.js"></script>
</body>
</html>
