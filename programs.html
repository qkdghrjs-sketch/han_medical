<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피부 프로그램 | 한내과의원</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="/">한내과의원</a>
      <button class="menu-btn" aria-label="메뉴 열기">☰</button>
      <nav class="nav">
        <a href="/">홈</a>
        <a href="/departments">진료과목</a>
        <a href="/programs">피부 프로그램</a>
        <a href="/info">진료안내</a>
        <a href="/contact">오시는길</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h2>피부 시술 / 관리 프로그램</h2>
      <div class="grid-2">
        <article class="card">
          <h3>시술 프로그램</h3>
          <ul class="list-clean">
            <li>IPL (잡티·주근깨·검버섯)</li>
            <li>레이저 토닝 (기미·안색)</li>
            <li>텐써마 / V라인 리프팅</li>
            <li>MTS (모공·피부결)</li>
            <li>CO2 (점·사마귀)</li>
          </ul>
        </article>

        <article class="card">
          <h3>관리 프로그램</h3>
          <ul class="list-clean">
            <li>플라즈마 (모공·각질)</li>
            <li>스킨부스터 (진정·물광)</li>
            <li>고주파 탄력관리</li>
            <li>여드름·흉터 관리</li>
            <li>비타민·재생 관리</li>
          </ul>
        </article>
      </div>
      <p class="lead" style="margin-top:16px;">※ 시술 및 비용은 내원 상담 후 개인 상태에 따라 달라질 수 있습니다.</p>
    </div>
  </main>

  <footer class="footer">© 2026 한내과의원</footer>
  <script src="script.js"></script>
</body>
</html>
